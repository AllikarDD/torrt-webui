version: '3.8'

services:
  torrt-webui:
    image: allikardd/torrt-webui:1.0.0
    container_name: torrt-webui
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - TORRT_PATH=/usr/local/bin/torrt
      - PORT=5000
    volumes:
      - ./torrt-config:/root/.torrt