{% extends "base.html" %}

{% block title %}RPC Clients{% endblock %}

{% block content %}
<div id="rpc-page">
    <h2>RPC Clients Management</h2>
    <a href="/" class="btn btn-secondary mb-3">Back to Home</a>

    <div id="page-messages"></div>

<div class="card mb-4">
    <div class="card-header">
        <h5 class="mb-0">Available RPC Clients</h5>
    </div>
    <div class="card-body" id="rpc-list-container">
        <p class="text-muted mb-0">Loading RPC clients...</p>
    </div>
</div>

<div id="rpc-edit-form" class="card mb-4" style="display: none;">
    <div class="card-header bg-info text-white">
        <h5 class="mb-0">⚙️ Configure RPC Client</h5>
    </div>
    <div class="card-body">
        <form id="configure-rpc-form">
            <input type="hidden" name="action" value="configure">
            <input type="hidden" name="rpc_alias" id="rpc_edit_alias">
            <div class="mb-3">
                <label class="form-label">URL</label>
                <input type="text" name="url" id="rpc_edit_url" class="form-control" placeholder="RPC URL">
            </div>
            <div class="mb-3">
                <label class="form-label">Host</label>
                <input type="text" name="host" id="rpc_edit_host" class="form-control" placeholder="RPC host">
            </div>
            <div class="mb-3">
                <label class="form-label">Port</label>
                <input type="text" name="port" id="rpc_edit_port" class="form-control" placeholder="RPC port">
            </div>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" id="rpc_edit_username" class="form-control" placeholder="RPC username">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" id="rpc_edit_password" class="form-control" placeholder="RPC password">
            </div>
            <button type="submit" class="btn btn-info">Update Configuration</button>
            <button type="button" class="btn btn-secondary" onclick="hideRpcEditForm()">Cancel</button>
        </form>
    </div>
</div>
</div>
{% endblock %}
